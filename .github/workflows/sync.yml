name: "Sync Upstream"

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: benchmark-hugo-go-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync With Upstream
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.BOT_PUBLIC_GITHUB_TOKEN || github.token }}

      - name: Sync upstream submodule
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_BOT_TOKEN: ${{ secrets.BOT_PUBLIC_GITHUB_TOKEN != '' }}
        run: |
          set -euo pipefail
          git config --global user.name "boringcache-bot"
          git config --global user.email "boringcache-bot@users.noreply.github.com"

          git submodule sync --recursive
          git submodule update --init --remote --merge upstream

          github_repo_slug() {
            local url="$1"
            url="${url%/}"
            url="${url#https://github.com/}"
            url="${url#git@github.com:}"
            url="${url#ssh://git@github.com/}"
            url="${url%.git}"
            url="${url%/}"
            printf '%s' "$url"
          }

          upstream_url="$(cd upstream && git remote get-url origin)"
          upstream_repo="$(github_repo_slug "$upstream_url")"
          commit_sha="$(cd upstream && git rev-parse --short=7 HEAD)"

          if git diff --quiet --submodule=short; then
            echo "No upstream changes"
            exit 0
          fi

          git add upstream
          git commit -m "Update upstream to ${upstream_repo}@${commit_sha}"
          git push origin HEAD:main

          if [[ "${HAS_BOT_TOKEN}" != "true" ]]; then
            gh workflow run "hugo-go-benchmark.yml" --repo "$GITHUB_REPOSITORY" --ref main -f cache_lane=rolling
          fi
