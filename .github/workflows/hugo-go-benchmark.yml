name: "Hugo Go Benchmark"
run-name: >-
  ${{ format('Benchmark {0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Rolling' || 'Fresh', github.event_name == 'schedule' && 'Scheduled' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override (blank = adaptive)"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override (blank = match download concurrency)"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES (Docker/OCI only; blank = disabled)"
        required: false
        type: string
  schedule:
    - cron: "0 4 * * 1"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/hugo-go-benchmark.yml"
      - ".github/workflows/reusable-go-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: Build with GitHub Actions Cache
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: actions-cache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      go_version: "1.25.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit

  depot-cache:
    name: Build with Depot Cache
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: depot-cache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      go_version: "1.25.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit

  boringcache:
    name: Build with BoringCache
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      blob_download_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
      blob_prefetch_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
      oci_stream_through_min_bytes: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}
      go_version: "1.25.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit
