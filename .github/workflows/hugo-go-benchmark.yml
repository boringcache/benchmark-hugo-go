name: "Hugo Go Benchmark"
run-name: >-
  ${{ format('Benchmark {0} | {1}', github.event_name == 'pull_request' && 'Validation' || 'Rolling', github.event_name == 'push' && 'Upstream update' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/hugo-go-benchmark.yml"
      - ".github/workflows/hugo-go-fresh-benchmark.yml"
      - ".github/workflows/reusable-go-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: GHA
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: actions-cache
      cache_lane: ${{ github.event_name == 'pull_request' && 'fresh' || 'rolling' }}
      go_version: "1.26.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit

  boringcache:
    name: BC
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'pull_request' && 'fresh' || 'rolling' }}
      go_version: "1.26.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit
