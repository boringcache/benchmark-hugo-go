name: "Hugo Go Benchmark"
run-name: >-
  ${{ format('Benchmark {0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cli_version != '' && 'Canary' || (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling')) && 'Rolling' || 'Fresh', github.event_name == 'push' && 'Upstream update' || github.event_name == 'schedule' && 'Weekly' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      cli_version:
        description: "Optional BoringCache CLI release tag for canary runs."
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  schedule:
    - cron: "0 4 * * 1"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/hugo-go-benchmark.yml"
      - ".github/workflows/reusable-go-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: GHA
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: actions-cache
      cache_lane: ${{ github.event_name == 'push' && 'rolling' || github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      go_version: "1.26.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit

  boringcache:
    name: BC
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'push' && 'rolling' || github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      cli_version: ${{ inputs.cli_version || vars.BORINGCACHE_BENCHMARK_CLI_VERSION || 'v1.13.93' }}
      go_version: "1.26.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit
