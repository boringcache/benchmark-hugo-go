name: "Hugo Go - Depot Cache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Depot Cache Rolling' || 'Depot Cache Fresh', github.event_name == 'schedule' && 'Weekly fresh' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/hugo-go-boringcache.yml"
      - ".github/workflows/hugo-go-actions-cache.yml"
      - ".github/workflows/hugo-go-depot-cache.yml"
      - ".github/workflows/reusable-go-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: read

jobs:
  benchmark:
    uses: ./.github/workflows/reusable-go-benchmark.yml
    with:
      benchmark_id: hugo-go
      project_repo: gohugoio/hugo
      strategy: depot-cache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      go_version: "1.25.0"
      build_command: go build -trimpath -buildvcs=false ./...
    secrets: inherit
